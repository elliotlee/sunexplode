<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Opening Pact…</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Courier New', Courier, monospace;
      background: #F5F0E8;
      color: #1A1A1A;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      border: 2px solid #1A1A1A;
      background: #fff;
      padding: 40px 32px;
      max-width: 400px;
      width: 100%;
      text-align: center;
    }
    h1 { font-size: 22px; letter-spacing: 3px; margin-bottom: 12px; }
    p  { font-size: 14px; color: #555; line-height: 1.6; margin-bottom: 20px; }
    a.btn {
      display: inline-block;
      background: #1A6B3C;
      color: #fff;
      text-decoration: none;
      padding: 12px 28px;
      font-family: inherit;
      font-size: 13px;
      letter-spacing: 2px;
      border: 2px solid #1A1A1A;
    }
    .error { color: #c0392b; }
  </style>
</head>
<body>
  <div class="card">
    <h1>PACT</h1>
    <p id="msg">Opening the app…</p>
    <a id="fallback" class="btn" style="display:none">OPEN APP</a>
  </div>

  <script>
    const hash = window.location.hash; // #access_token=...&refresh_token=...
    const deepLink = 'pact://auth/callback' + hash;

    if (!hash || !hash.includes('access_token')) {
      document.getElementById('msg').textContent = 'This link has expired or is invalid. Please request a new confirmation email.';
      document.getElementById('msg').className = 'error';
    } else {
      // Try to redirect immediately
      window.location.replace(deepLink);

      // Show the manual fallback after a short delay
      setTimeout(() => {
        const fb = document.getElementById('fallback');
        fb.href = deepLink;
        fb.style.display = 'inline-block';
        document.getElementById('msg').textContent = "If the app didn't open, tap below:";
      }, 1500);
    }
  </script>
</body>
</html>
