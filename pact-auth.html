<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Opening Pact…</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Courier New', Courier, monospace;
      background: #F5F0E8;
      color: #1A1A1A;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      border: 2px solid #1A1A1A;
      background: #fff;
      padding: 40px 32px;
      max-width: 400px;
      width: 100%;
      text-align: center;
    }
    h1 { font-size: 22px; letter-spacing: 3px; margin-bottom: 12px; }
    p  { font-size: 14px; color: #555; line-height: 1.6; margin-bottom: 20px; }
    a.btn {
      display: inline-block;
      background: #1A6B3C;
      color: #fff;
      text-decoration: none;
      padding: 14px 32px;
      font-family: inherit;
      font-size: 13px;
      letter-spacing: 2px;
      border: 2px solid #1A1A1A;
    }
    .error { color: #c0392b; }
  </style>
</head>
<body>
  <div class="card">
    <h1>PACT</h1>
    <p id="msg">Tap below to open the app:</p>
    <a id="btn" class="btn" style="display:none">OPEN PACT</a>
  </div>

  <script>
    var hash = window.location.hash;

    if (!hash || !hash.includes('access_token')) {
      document.getElementById('msg').textContent = 'This link has expired or is invalid. Please request a new one.';
      document.getElementById('msg').className = 'error';
    } else {
      var deepLink = 'pact://auth/callback' + hash;
      var btn = document.getElementById('btn');
      btn.href = deepLink;
      btn.style.display = 'inline-block';

      // Auto-redirect — works on iOS Safari; Chrome on Android requires the tap above
      setTimeout(function() { window.location.replace(deepLink); }, 100);
    }
  </script>
</body>
</html>
